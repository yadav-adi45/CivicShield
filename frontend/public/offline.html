<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - CivicShield</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0d1332 0%, #1a1f3a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 500px;
    }
    
    .offline-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2rem;
    }
    
    .emergency-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 2rem;
    }
    
    .emergency-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #ff6b6b;
    }
    
    .emergency-contacts {
      display: grid;
      gap: 0.5rem;
      text-align: left;
    }
    
    .contact-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
    }
    
    .contact-name {
      color: rgba(255, 255, 255, 0.9);
    }
    
    .contact-number {
      font-weight: 700;
      color: #4ade80;
    }
    
    .retry-btn {
      background: linear-gradient(135deg, #4facfe, #667eea);
      border: none;
      color: white;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: transform 0.2s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      CivicShield requires an internet connection for live crisis data. 
      However, you can still access emergency contacts and basic guidance below.
    </p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
    
    <div class="emergency-box">
      <div class="emergency-title">🚨 Emergency Contacts</div>
      <div class="emergency-contacts">
        <div class="contact-item">
          <span class="contact-name">All Emergencies</span>
          <span class="contact-number">112</span>
        </div>
        <div class="contact-item">
          <span class="contact-name">Police</span>
          <span class="contact-number">100</span>
        </div>
        <div class="contact-item">
          <span class="contact-name">Fire</span>
          <span class="contact-number">101</span>
        </div>
        <div class="contact-item">
          <span class="contact-name">Ambulance</span>
          <span class="contact-number">102</span>
        </div>
        <div class="contact-item">
          <span class="contact-name">Disaster Management</span>
          <span class="contact-number">108</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
